name: Bug report
description: Report a bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing an issue. For questions and general discussion, the
        [Discord](https://discord.com/invite/7wanVzCBWf) is a better fit.

        If you are reporting an issue where you are not able to compile your document,
        please do the following first:

        1. Set a main file in the file explorer: right-click a .tex file and click "Set as main file"
        2. Check your compile command (Terminal > Configure compile command)
        3. Can you compile the document in the Texpile terminal? Paste your compile command directly into the terminal and run it
        4. Is your document itself broken? Open a native terminal (PowerShell, bash, etc.) and check whether it compiles there
        5. If possible, attach the compile log, in full or at least the part with the error

        If you are reporting an issue with live mode, please classify it:

        1. The preview is incorrect: regular lualatex produces a different PDF than live mode
        2. Any other issue

        Please understand that in live mode, only a limited set of things can be rendered instantly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages if any.
  - type: input
    id: version
    attributes:
      label: Texpile version
      description: Help > About, or the installer filename
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04
  - type: input
    id: tex
    attributes:
      label: TeX distribution
      description: Only if compile-related
      placeholder: e.g. TeX Live 2025, MiKTeX, MacTeX
  - type: input
    id: compile-command
    attributes:
      label: Compile command
      description: Terminal > Configure compile command
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >-
        Anything else that helps: screenshots, compile logs, or a minimal .tex file
        that reproduces the problem. For round-trip issues (the file changed after
        saving), please attach the original file and describe the edit.
