# type-check, lint, and unit-test on every commit and pull request. Also callable: the
# release workflow runs this same job as its gate, so tag pushes are covered there and
# excluded here (branches-only) to avoid running twice.
name: test

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's packageManager field
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # svelte-check resolves svelte-pdf-view through its dist, so build the package first
      - run: pnpm --filter svelte-pdf-view package

      - run: pnpm --filter texpile-editor check
      - run: pnpm --filter texpile-editor lint
      - run: pnpm --filter texpile-editor testonce
      - run: npx tsc -p electron --noEmit
