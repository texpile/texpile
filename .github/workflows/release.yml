# Build Texpile installers for all three OSes; a version tag (v*) also publishes to R2 and creates
# a binary-free GitHub release (notes + download link; distribution is texpile.com, not GitHub).
# publish-r2 also ships the electron-updater feed: latest*.yml at the bucket root (served by
# updates.texpile.com) with file urls pointing at the immutable v<version>/ binaries + blockmaps.
#
# node-pty ships win/mac prebuilds but no linux ones, so Linux rebuilds it for Electron's ABI.
# Windows always signs with Azure Trusted Signing (AZURE_* repo variables + secrets); macOS always
# signs (Developer ID) and notarizes (MACOS_CSC_*/APPLE_* secrets). Linux always builds unsigned
# (no distribution-wide signing convention there). Signing is injected as env vars/CLI overrides
# here (not electron-builder.yml) so local `pnpm dist` stays unsigned and needs no credentials.
# electron-builder reads CSC_LINK/CSC_KEY_PASSWORD directly (it auto-detects raw base64 content
# and manages its own temporary signing keychain); notarization only needs APPLE_API_KEY/_ID/_ISSUER
# as env vars, no explicit config, since @electron/notarize's `--key` arg must be a real file path,
# not the secret's base64 content, it's decoded to a temp file first.
name: release

on:
  workflow_dispatch:
    inputs:
      publish_r2:
        description: 'Also upload the installers to the R2 downloads bucket'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub release on tag builds

jobs:
  # the full test workflow gates every release build: a tag or manual dispatch never
  # ships installers from a commit that fails check/lint/unit tests
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        # latest*.yml + the mac zip + the blockmaps feed electron-updater (see publish-r2);
        # AppImage embeds its blockmap, so Linux ships no separate one
        include:
          - os: windows-latest
            artifacts: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - os: macos-latest
            artifacts: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - os: ubuntu-latest
            artifacts: |
              release/*.AppImage
              release/*.deb
              release/latest-linux.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # no linux prebuilds ship with node-pty
      - if: runner.os == 'Linux'
        run: pnpm electron:rebuild

      # version goes into the artifact name so a stale build can't be mistaken for a fresh one
      - id: ver
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
        shell: bash

      # newest CHANGELOG entry -> latest*.yml releaseNotes (shown in the in-app update modal)
      - name: Write release notes for the updater feed
        run: node apps/texpile-editor/scripts/release-notes.mjs > release-notes.md
        shell: bash

      # the PowerShell module electron-builder uses for Azure Trusted Signing; a named up-front step
      # turns a PSGallery hiccup into an obvious failure. Version matches electron-builder@25.1.8.
      # Installed with PSResourceGet, which ships with the runner's PowerShell 7 and reaches the
      # gallery on its own: PowerShellGet v2 first has to bootstrap a NuGet provider, and when that
      # fails PSGallery is never registered, so Set-PSRepository dies with "No repository with the
      # name 'PSGallery' was found" (this is what broke the v0.14.0 build).
      - name: Set up Azure Trusted Signing (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Install-PSResource -Name TrustedSigning -Version 0.4.1 -Repository PSGallery -TrustRepository -Scope CurrentUser -ErrorAction Stop
          # import here too: a module that installs but won't load should fail this step, not the build
          Import-Module TrustedSigning -RequiredVersion 0.4.1 -ErrorAction Stop
          Write-Host "TrustedSigning $((Get-Module TrustedSigning).Version) ready"

      # creds come from the AZURE_* secrets, account/profile/endpoint from repo variables. The
      # RFC-3161 timestamp is essential: Trusted Signing certs live ~3 days, so untimestamped
      # signatures die when the cert lapses. Use the long --config.<path> form: pwsh tokenizes
      # -c.<path> into `-c` plus a bogus config file path (ENOENT).
      - name: Build & sign installer (Windows / Azure Trusted Signing)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          pnpm dist
          --config.releaseInfo.releaseNotesFile=release-notes.md
          --config.win.azureSignOptions.endpoint=${{ vars.AZURE_ENDPOINT }}
          --config.win.azureSignOptions.codeSigningAccountName=${{ vars.AZURE_CODE_SIGNING_ACCOUNT }}
          --config.win.azureSignOptions.certificateProfileName=${{ vars.AZURE_CERT_PROFILE }}
          --config.win.azureSignOptions.TimestampRfc3161=http://timestamp.acs.microsoft.com
          --config.win.azureSignOptions.TimestampDigest=SHA256
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      # decode the notarization API key to a real file: @electron/notarize passes it straight to
      # `xcrun notarytool --key`, which requires an actual path, not the secret's base64 content
      - name: Build & sign installer (macOS / Developer ID + notarization)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/apple_api_key.p8"
          export APPLE_API_KEY="$RUNNER_TEMP/apple_api_key.p8"
          pnpm dist --config.releaseInfo.releaseNotesFile=release-notes.md
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Linux always builds unsigned (no distribution-wide signing convention there)
      - name: Build installer (Linux, unsigned)
        if: runner.os == 'Linux'
        run: pnpm dist --config.releaseInfo.releaseNotesFile=release-notes.md

      - uses: actions/upload-artifact@v4
        with:
          name: texpile-${{ runner.os }}-v${{ steps.ver.outputs.v }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  # publish the installers to the R2 bucket behind the landing page's download links.
  # Needs CLOUDFLARE_API_TOKEN ("Workers R2 Storage: Edit") + CLOUDFLARE_ACCOUNT_ID secrets.
  publish-r2:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_r2
    runs-on: ubuntu-latest
    # the Cloudflare secrets live in this environment; without naming it they never reach the job
    environment: CICD
    env:
      BUCKET: texpile-releases # must match the bucket name created in the Cloudflare dashboard
    steps:
      # only needed to read the version from package.json
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: texpile-*
          merge-multiple: true
          path: dist

      # artifact names are pinned in electron-builder.yml (they're recorded inside latest*.yml,
      # so nothing may be renamed here); point the ymls' file urls at the immutable v<version>/ copies.
      # The presence check runs BEFORE any R2 write: the uploads aren't atomic, so a missing
      # artifact must fail the job here, not halfway through publishing
      - name: Verify artifacts and rewrite updater feed urls
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          missing=0
          for f in "Texpile-Setup-$VERSION.exe" "Texpile-Setup-$VERSION.exe.blockmap" \
                   "Texpile-$VERSION.dmg" "Texpile-$VERSION.zip" "Texpile-$VERSION.zip.blockmap" \
                   "Texpile-$VERSION.AppImage" "texpile-$VERSION.deb" \
                   latest.yml latest-mac.yml latest-linux.yml; do
            [ -f "dist/$f" ] || { echo "::error::missing artifact dist/$f"; missing=1; }
          done
          [ "$missing" = 0 ]
          node apps/texpile-editor/scripts/update-yml.mjs dist/latest.yml dist/latest-mac.yml dist/latest-linux.yml
          ls -la dist

      # the landing fetches this to link the versioned files and show the version; the updates
      # worker serves its `version` + `notes` (from the newest CHANGELOG.md entry) to the app
      - name: Write latest.json
        run: |
          node apps/texpile-editor/scripts/latest-json.mjs > dist/latest.json
          cat dist/latest.json

      # each release lands twice: an immutable copy under v<version>/, plus the stable root names
      # (overwritten every release, the landing's no-JS fallback links). The updater files ship
      # too: mac zip + blockmaps under v<version>/ (differential downloads fetch old-version
      # blockmaps by path, so v-prefixed copies must stay forever), latest*.yml at the root
      # (served to the app by updates.texpile.com from this same bucket).
      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          put() { npx wrangler@4 r2 object put "$BUCKET/$1" --file "$2" --remote --content-type "$3"; }
          put "v$VERSION/Texpile-Setup-$VERSION.exe" "dist/Texpile-Setup-$VERSION.exe" application/octet-stream
          put "v$VERSION/Texpile-$VERSION.dmg" "dist/Texpile-$VERSION.dmg" application/octet-stream
          put "v$VERSION/Texpile-$VERSION.AppImage" "dist/Texpile-$VERSION.AppImage" application/octet-stream
          put "v$VERSION/texpile-$VERSION.deb" "dist/texpile-$VERSION.deb" application/octet-stream
          put "v$VERSION/Texpile-$VERSION.zip" "dist/Texpile-$VERSION.zip" application/zip
          put "v$VERSION/Texpile-Setup-$VERSION.exe.blockmap" "dist/Texpile-Setup-$VERSION.exe.blockmap" application/octet-stream
          put "v$VERSION/Texpile-$VERSION.zip.blockmap" "dist/Texpile-$VERSION.zip.blockmap" application/octet-stream
          put "Texpile-Setup.exe" "dist/Texpile-Setup-$VERSION.exe" application/octet-stream
          put "Texpile.dmg" "dist/Texpile-$VERSION.dmg" application/octet-stream
          put "Texpile.AppImage" "dist/Texpile-$VERSION.AppImage" application/octet-stream
          put "texpile.deb" "dist/texpile-$VERSION.deb" application/octet-stream
          put "latest.yml" "dist/latest.yml" "text/yaml; charset=utf-8"
          put "latest-mac.yml" "dist/latest-mac.yml" "text/yaml; charset=utf-8"
          put "latest-linux.yml" "dist/latest-linux.yml" "text/yaml; charset=utf-8"
          put "latest.json" "dist/latest.json" application/json

      # cumulative manifest for the landing's version history (latest.json only describes the
      # newest). Dropping any existing entry for this version keeps a re-publish idempotent.
      - name: Update versions.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 r2 object get "$BUCKET/versions.json" --file dist/versions.json --remote 2>/dev/null \
            || echo '{"versions":[]}' > dist/versions.json
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;
            let manifest;
            try { manifest = JSON.parse(fs.readFileSync("dist/versions.json", "utf8")); } catch { manifest = null; }
            if (!manifest || !Array.isArray(manifest.versions)) manifest = { versions: [] };
            const entry = JSON.parse(fs.readFileSync("dist/latest.json", "utf8"));
            manifest.versions = manifest.versions.filter((v) => v.version !== version);
            manifest.versions.unshift(entry);
            // retention: list only the newest major line and its latest 3 minor series; the
            // v<version>/ binaries stay in R2 forever regardless (blockmaps reference them) delete manually
            const num = (s) => s.version.split(".").map(Number);
            const top = Math.max(...manifest.versions.map((v) => num(v)[0]));
            const minors = [...new Set(manifest.versions.filter((v) => num(v)[0] === top).map((v) => num(v)[1]))]
              .sort((a, b) => b - a)
              .slice(0, 3);
            manifest.versions = manifest.versions.filter((v) => num(v)[0] === top && minors.includes(num(v)[1]));
            fs.writeFileSync("dist/versions.json", JSON.stringify(manifest, null, 2));
          '
          cat dist/versions.json
          npx wrangler@4 r2 object put "$BUCKET/versions.json" --file dist/versions.json --remote --content-type application/json

      # binaries are deliberately NOT attached: distribution is texpile.com/download (R2).
      # The release is just the public changelog entry, published automatically.
      - name: Publish GitHub release (notes + download link, no binaries)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo "Download installers: https://texpile.com/download"; echo; \
            node apps/texpile-editor/scripts/release-notes.mjs | sed 's/^/- /'; } > body.md
          gh release create "$GITHUB_REF_NAME" --title "Texpile $GITHUB_REF_NAME" --notes-file body.md
