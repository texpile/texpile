appId: com.texpile.desktop
productName: Texpile
copyright: Copyright © Texpile

# .tex file associations; main.ts turns an opened file into an "open its folder" workspace action
fileAssociations:
  - ext: tex
    name: LaTeX Document
    role: Editor
    mimeType: text/x-tex

# generic provider = electron-updater feed only: it makes electron-builder emit latest*.yml and
# stamp resources/app-update.yml, and it cannot self-upload (release.yml pushes everything to R2).
# The feed host serves the ymls from the releases bucket and counts checks; the ymls' file urls
# are rewritten to dl.texpile.com by scripts/update-yml.mjs before upload.
publish:
  provider: generic
  url: https://updates.texpile.com

directories:
  output: release

# only the Electron shell goes into the asar; the renderer bundle ships as an extra resource,
# served from the app:// protocol. The exclusions keep third-party sourcemaps/tests out.
files:
  - electron/dist/**/*
  - electron/icon.png
  - package.json
  - '!**/*.map'
  - '!**/node_modules/**/{test,tests,__mocks__}/**'

# node-pty (its .node binary plus the Windows ConPTY runtime, conpty.dll / OpenConsole.exe) must
# stay out of the asar so it can be dlopen'd at runtime
asarUnpack:
  - '**/node_modules/node-pty/**'

# restore the exec bit on node-pty's macOS spawn-helper (lost in packaging -> "posix_spawnp failed")
afterPack: scripts/after-pack.cjs

extraResources:
  - from: apps/texpile-editor/dist
    to: app-dist
    filter:
      - '**/*'
  # Draft-mode engine (walker.lua / page-extract.lua). Ships OUTSIDE the asar so the
  # user's spawned lualatex can read them by absolute path (reads aren't sandboxed;
  # only writes are). Resolved at runtime via process.resourcesPath/lua.
  - from: electron/lua
    to: lua
    filter:
      - '**/*.lua'

# node-pty is rebuilt for Electron's ABI in the `dist` script (pnpm electron:rebuild), so
# electron-builder must not try (and overwrite) it here
npmRebuild: false

# mac/win take the single 1024 PNG (electron-builder derives .ico/.icns). Linux needs the
# pre-sized set in build/icons: Ubuntu's hicolor theme indexes nothing above 512, so a lone
# 1024 icon is invisible to the launcher (generic gear in the app grid).
linux:
  target:
    - AppImage
    - deb
  category: Office
  synopsis: A local, offline LaTeX editor
  icon: build/icons

# built names are the download names here too (latest-linux.yml records them, see mac note)
appImage:
  artifactName: ${productName}-${version}.${ext}
deb:
  artifactName: texpile-${version}.${ext}
  # stock postinst probes userns as root, leaving chrome-sandbox non-SUID on Ubuntu 24.04+
  # (AppArmor restricts unprivileged userns) -> app aborts at launch. Ours always SUIDs it.
  afterInstall: build/deb-after-install.tpl

mac:
  # one universal (x64 + arm64) dmg so Intel Macs are covered; a host-arch build on the arm64
  # runner ships an arm64-only dmg. node-pty has both darwin prebuilds, so the merge succeeds.
  # The zip exists only for the updater (Squirrel.Mac consumes it; latest-mac.yml needs it).
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  # built names ARE the download names. latest-mac.yml records these exact filenames, so a
  # CI-side rename would break the updater feed; keep them canonical at the source.
  artifactName: ${productName}-${version}.${ext}
  category: public.app-category.productivity
  icon: electron/icon.png

win:
  target:
    - nsis
  icon: electron/icon.png

# show the AGPL text as an installer page (macOS/Linux installs have no comparable UI).
# The artifact name must have no spaces: electron-builder's Trusted Signing signer space-joins
# its Invoke-TrustedSigning -Files arg without quoting, so a spaced name gets split and signing fails.
nsis:
  license: build/license.txt
  artifactName: ${productName}-Setup-${version}.${ext}
